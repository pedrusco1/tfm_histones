        "glmmTMB (>= 1.1.2.3)",
        "phylolm (>= 2.6.5)"
      ],
      "Enhances": [
        "phyr",
        "rstan",
        "rjags",
        "BayesianTools"
      ],
      "License": "GPL (>= 3)",
      "URL": "http://florianhartig.github.io/DHARMa/",
      "LazyData": "TRUE",
      "BugReports": "https://github.com/florianhartig/DHARMa/issues",
